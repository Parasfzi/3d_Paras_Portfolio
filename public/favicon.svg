<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#B600A8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7621B0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#D7E2EA;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="31" fill="url(#grad)" />
  <!-- Inner subtle glow ring -->
  <circle cx="32" cy="32" r="28" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1"/>
  <!-- Code brackets </ > -->
  <text x="32" y="38" font-family="monospace" font-size="22" font-weight="900" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-1">&lt;/&gt;</text>
</svg>